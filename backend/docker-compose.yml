services:

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: phones_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phones_db
    ports:
      - "5432:5432"
    volumes:
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Auto-run migration on first start
      - ./migration/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go API
  api:
    build: .
    container_name: phones_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/phones_db
      JWT_SECRET: change-me-in-production
      ADMIN_PASSWORD: adminpassword
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: